<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Theoistic — Notes from the frontier of AI</title>
<meta name="description" content="Field notes, experiments, and half-formed ideas from the Theoistic lab.">
<link rel="icon" href="assets/theoistic-logo.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">

<!-- Markdown renderer (standalone vanilla library; used to turn .md article bodies into HTML) -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#ffffff;-webkit-font-smoothing:antialiased;}
.thx-prose{font-family:'Newsreader',Georgia,serif;color:#27313f;font-size:19px;line-height:1.78;}
.thx-prose>*:first-child{margin-top:0;}
.thx-prose h2{font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:25px;line-height:1.25;color:#0f172a;margin:2.05em 0 .55em;letter-spacing:-.01em;}
.thx-prose h3{font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:20px;color:#0f172a;margin:1.8em 0 .5em;}
.thx-prose p{margin:0 0 1.15em;}
.thx-prose ul,.thx-prose ol{margin:0 0 1.2em 1.25em;padding:0;}
.thx-prose li{margin:.35em 0;}
.thx-prose a{color:var(--accent,#2563eb);text-decoration:underline;text-underline-offset:2px;}
.thx-prose strong{font-weight:600;color:#0f172a;}
.thx-prose em{font-style:italic;}
.thx-prose blockquote{margin:1.5em 0;padding:.35em 0 .35em 1.3em;border-left:3px solid var(--accent,#93c5fd);color:#475569;font-style:italic;font-size:20px;line-height:1.6;}
.thx-prose code{font-family:ui-monospace,'SFMono-Regular',Menlo,monospace;background:#eef2f7;color:#0f172a;padding:.12em .42em;border-radius:6px;font-size:.8em;}
.thx-prose pre{background:#0f172a;color:#e2e8f0;padding:1.1em 1.3em;border-radius:14px;overflow:auto;margin:1.4em 0;}
.thx-prose pre code{background:none;color:inherit;padding:0;font-size:.85em;}
.thx-prose hr{border:none;border-top:1px solid #e6ebf2;margin:2em 0;}
.thx-about p:first-of-type{font-size:23px;line-height:1.62;color:#334155;}
.thx-about h2{color:var(--accent,#2563eb);}
@media (max-width:640px){
.thx-grid{grid-template-columns:1fr !important;}
.thx-featured{grid-template-columns:1fr !important;}
.thx-featured-thumb{min-height:210px !important;}
.thx-about-intro{grid-template-columns:1fr !important;}
}
@keyframes thxPop{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
@keyframes heroTextIn{from{opacity:0;transform:translateY(14px);filter:blur(7px);}to{opacity:1;transform:none;filter:none;}}
@keyframes heroTextOut{from{opacity:1;transform:none;filter:none;}to{opacity:0;transform:translateY(14px);filter:blur(8px);}}
@keyframes windIn{from{opacity:0;transform:translateY(26px);filter:blur(9px);}to{opacity:1;transform:none;filter:none;}}
@keyframes windOut{from{opacity:1;transform:none;filter:none;}to{opacity:0;transform:translateY(-20px);filter:blur(10px);}}
@keyframes articleIn{from{opacity:0;transform:translateY(28px);filter:blur(11px);}to{opacity:1;transform:none;filter:none;}}
@keyframes articleOut{from{opacity:1;transform:none;filter:none;}to{opacity:0;transform:translateY(20px);filter:blur(11px);}}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes skyKen{0%,100%{transform:scale(1.05) translate3d(-1.2%,0,0);}50%{transform:scale(1.07) translate3d(1.2%,0,0);}}
</style>
</head>

<body>
<div id="app" style="font-family:'Schibsted Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;background:#ffffff;color:#0f172a;position:relative;overflow-x:hidden;">

  <!-- Sky header backdrop -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:0;pointer-events:none;overflow:hidden;">
    <img src="assets/sky-header.png" alt="" style="display:block;width:100%;height:auto;animation:skyKen 46s ease-in-out infinite;transform-origin:50% 55%;" />
  </div>

  <!-- Navigation -->
  <nav style="position:absolute;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:24px clamp(20px,5vw,56px);">
    <div data-nav="home" style="display:flex;align-items:center;cursor:pointer;">
      <img src="assets/theoistic-logo.png" alt="Theoistic" style="height:50px;width:auto;display:block;filter:drop-shadow(0 2px 10px rgba(255,255,255,.6));animation:bob 6s ease-in-out infinite;" />
    </div>
    <div style="display:flex;align-items:center;gap:clamp(12px,2vw,30px);">
      <a data-nav="home" style="color:#1f3a5f;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;text-shadow:0 1px 10px rgba(255,255,255,.55);">Home</a>
      <a data-nav="about" style="color:#1f3a5f;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;text-shadow:0 1px 10px rgba(255,255,255,.55);">About</a>
      <a href="https://github.com/theoistic" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.28);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:#1f3a5f;font-size:15px;font-weight:600;padding:9px 15px;border-radius:13px;cursor:pointer;text-decoration:none;box-shadow:0 6px 20px -8px rgba(40,80,140,.3);">
        <svg width="17" height="17" viewBox="0 0 16 16" fill="#1f3a5f"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span>GitHub</span>
      </a>
    </div>
  </nav>

  <!-- Hero -->
  <header style="position:relative;z-index:3;height:clamp(430px,32vw,500px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:72px clamp(20px,5vw,56px) 52px;">
    <div style="position:absolute;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(58% 64% at 50% 46%,rgba(56,108,170,.2),rgba(56,108,170,0) 68%);"></div>
    <div id="hero-back"></div>
    <div id="hero-content"></div>
  </header>

  <!-- Content card -->
  <main style="position:relative;z-index:5;max-width:1120px;margin:-52px auto 0;background:#ffffff;border-radius:26px 26px 0 0;box-shadow:0 -2px 26px -18px rgba(40,80,140,.08),0 28px 80px -42px rgba(40,80,140,.22);padding:clamp(18px,2.4vw,32px) clamp(20px,4vw,46px) 80px;perspective:1300px;">
    <div id="main-content"></div>
  </main>

</div>

<script>
(function () {
  'use strict';

  /* -------------------------------------------------------------------------
     Theoistic blog — vanilla-JS rewrite of the original Claude Design
     "Blog.dc.html" component (which ran on a small React-like DCLogic runtime).
     No framework, no build step. Front page reads posts/index.json; each
     article body is fetched lazily from posts/<slug>.md when opened.
  ------------------------------------------------------------------------- */

  /* ---- configuration (was data-props on the design component) ---- */
  var ACCENT = '#2563eb';        // accent colour: #2563eb | #0f172a | #7c3aed | #15803d
  var DEFAULT_SORT = 'Newest';   // Newest | Oldest | A–Z
  var SHOW_SEARCH = true;

  /* ---- application state ---- */
  var state = {
    posts: [], loading: true, error: '',
    view: 'list', slug: null,
    query: '', activeCat: 'All', sort: null, sortOpen: false,
    listPhase: 'in', reveal: true, postPhase: null,
    about: null, bodies: {}
  };

  var timers = {};
  var els = {};

  /* ===================== small utilities ===================== */

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Turn a React-style camelCase style object into a CSS declaration string.
  function css(o) {
    var out = '';
    for (var k in o) {
      if (!Object.prototype.hasOwnProperty.call(o, k)) continue;
      var v = o[k];
      if (v == null || v === '') continue;
      var prop = (k.charAt(0) === '-') ? k : k.replace(/[A-Z]/g, function (m) { return '-' + m.toLowerCase(); });
      out += prop + ':' + v + ';';
    }
    return out;
  }

  function hexA(hex, a) {
    var h = (hex || '#2563eb').replace('#', '');
    if (h.length === 3) h = h.split('').map(function (c) { return c + c; }).join('');
    var n = parseInt(h, 16);
    return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
  }

  function gradientFor(color) {
    var map = {
      blue: 'linear-gradient(150deg,#dbeafe,#bfdbfe)',
      green: 'linear-gradient(150deg,#dcfce7,#bbf7d0)',
      teal: 'linear-gradient(150deg,#ccfbf1,#99f6e4)',
      amber: 'linear-gradient(150deg,#fef3c7,#fde68a)',
      violet: 'linear-gradient(150deg,#ede9fe,#ddd6fe)',
      rose: 'linear-gradient(150deg,#ffe4e6,#fecdd3)'
    };
    return map[color] || map.blue;
  }

  // Make an author-supplied path safe to drop inside url("...") within a
  // single-quoted style attribute (escape both quote characters).
  function cssUrl(v) {
    return encodeURI(String(v || '')).replace(/'/g, '%27').replace(/"/g, '%22');
  }

  // Background for a card thumb/cover: cover image if set, else the soft tint.
  function bgFor(p) {
    if (p.image) return 'linear-gradient(180deg,rgba(20,40,70,.04),rgba(20,40,70,.16)), url("' + cssUrl(p.image) + '") center/cover no-repeat';
    return gradientFor(p.color);
  }

  function prettyDate(iso) {
    if (!iso) return '';
    var d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Parse YAML-ish frontmatter (the same minimal subset generate-index.js uses).
  function parseFront(raw) {
    var m = raw.match(/^﻿?---\s*\r?\n([\s\S]*?)\r?\n---\s*\r?\n?([\s\S]*)$/);
    if (!m) return { meta: {}, body: raw };
    var meta = {};
    m[1].split(/\r?\n/).forEach(function (line) {
      var i = line.indexOf(':');
      if (i < 0) return;
      var k = line.slice(0, i).trim();
      var v = line.slice(i + 1).trim();
      if ((v.charAt(0) === '"' && v.slice(-1) === '"') || (v.charAt(0) === "'" && v.slice(-1) === "'")) v = v.slice(1, -1);
      if (v === 'true') v = true; else if (v === 'false') v = false;
      meta[k] = v;
    });
    return { meta: meta, body: m[2] };
  }

  function markdown(src) {
    if (window.marked && typeof window.marked.parse === 'function') return window.marked.parse(src || '');
    // Offline fallback: show the raw markdown rather than nothing.
    return '<pre style="white-space:pre-wrap">' + esc(src || '') + '</pre>';
  }

  function scrollTop() {
    try { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    catch (e) { try { window.scrollTo(0, 0); } catch (e2) {} }
  }

  /* ===================== shared style fragments ===================== */

  function tagStyle() {
    return css({ background: hexA(ACCENT, 0.1), color: ACCENT, fontSize: '12px', fontWeight: 600, padding: '4px 11px', borderRadius: '8px', whiteSpace: 'nowrap' });
  }
  var DATE_PILL = css({ background: '#f1f5f9', color: '#64748b', fontSize: '12px', fontWeight: 500, padding: '4px 11px', borderRadius: '8px', whiteSpace: 'nowrap' });
  var READ_CHIP = css({ position: 'absolute', top: '12px', left: '12px', background: 'rgba(255,255,255,.9)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', color: '#475569', fontSize: '11.5px', fontWeight: 600, padding: '6px 11px', borderRadius: '999px', boxShadow: '0 6px 16px -8px rgba(40,80,140,.35)' });

  function avatarDot(p) {
    return css({ width: '20px', height: '20px', borderRadius: '50%', background: gradientFor(p.color), flexShrink: 0, boxShadow: 'inset 0 0 0 1px rgba(255,255,255,.55)' });
  }

  function cardAnim(idx, phase) {
    if (phase === 'in') return 'windIn 1.15s cubic-bezier(.37,0,.21,1) ' + (70 + idx * 100) + 'ms both';
    if (phase === 'out') return 'windOut .66s cubic-bezier(.37,0,.21,1) ' + (idx * 50) + 'ms forwards';
    return '';
  }

  function heroInAnim() { return state.reveal ? 'heroTextIn 1.1s cubic-bezier(.37,0,.21,1) both' : ''; }
  function contentInAnim() { return state.reveal ? 'articleIn 1.15s cubic-bezier(.37,0,.21,1) both' : ''; }

  /* ===================== data loading ===================== */

  function loadPosts() {
    fetch('posts/index.json', { cache: 'no-cache' }).then(function (r) {
      if (!r.ok) throw new Error('index ' + r.status);
      return r.json();
    }).then(function (list) {
      var out = list.map(function (p) {
        return Object.assign({}, p, { dateLabel: prettyDate(p.date) });
      });
      out.sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });
      state.posts = out;
      state.loading = false;
      state.listPhase = 'in';
      loadAbout();
      enterView();
      timers.phase = setTimeout(function () { if (state.listPhase === 'in') { state.listPhase = null; } }, 1100);
    }).catch(function () {
      state.loading = false;
      state.error = 'Could not load posts. If you opened this file straight from disk, serve it through a local server or GitHub Pages — browsers block reading local files over file://.';
      enterView();
    });
  }

  function loadAbout() {
    fetch('about.md', { cache: 'no-cache' }).then(function (r) {
      return r.ok ? r.text() : '';
    }).then(function (raw) {
      if (!raw) return;
      var pf = parseFront(raw);
      state.about = Object.assign({}, pf.meta, { body: pf.body });
      if (state.view === 'about') enterView();
    }).catch(function () {});
  }

  function fetchBody(slug) {
    if (!slug || state.bodies[slug] !== undefined) return;
    fetch('posts/' + slug + '.md', { cache: 'no-cache' }).then(function (r) {
      return r.ok ? r.text() : '';
    }).then(function (raw) {
      state.bodies[slug] = parseFront(raw || '').body || '';
      if (state.view === 'post' && state.slug === slug) renderPostProse();
    }).catch(function () {
      state.bodies[slug] = '';
      if (state.view === 'post' && state.slug === slug) renderPostProse();
    });
  }

  /* ===================== view entry / transitions ===================== */

  // Render the hero + main for the CURRENT view, with entry animations.
  function enterView() {
    if (state.view === 'list') { renderListHero(); renderListMain(); }
    else if (state.view === 'post') { renderPostHero(); renderPostMain(); }
    else if (state.view === 'about') { renderAboutHero(); renderAboutMain(); }
  }

  function pulseReveal() {
    state.reveal = true;
    clearTimeout(timers.reveal);
    timers.reveal = setTimeout(function () { state.reveal = false; }, 1700);
  }
  function settleList() {
    clearTimeout(timers.list);
    timers.list = setTimeout(function () { if (state.listPhase === 'in') state.listPhase = null; }, 2000);
  }

  // Apply the "wind out" exit animation to the list (hero text + cards).
  function applyListOut() {
    var hc = els.heroContent.firstElementChild;
    if (hc) hc.style.animation = 'heroTextOut .55s cubic-bezier(.37,0,.21,1) forwards';
    var cards = els.mainContent.querySelectorAll('[data-anim]');
    for (var i = 0; i < cards.length; i++) {
      cards[i].style.animation = cardAnim(i, 'out');
    }
  }
  // Apply the article exit animation (hero text + content body).
  function applyArticleOut() {
    var hc = els.heroContent.firstElementChild;
    if (hc) hc.style.animation = 'heroTextOut .55s cubic-bezier(.37,0,.21,1) forwards';
    var wrap = els.mainContent.firstElementChild;
    if (wrap) wrap.style.animation = 'articleOut .6s cubic-bezier(.37,0,.21,1) forwards';
  }

  function openPost(slug) {
    if (state.listPhase === 'out') return;
    fetchBody(slug);
    state.sortOpen = false;
    state.listPhase = 'out';
    applyListOut();
    clearTimeout(timers.phase);
    timers.phase = setTimeout(function () {
      state.view = 'post'; state.slug = slug; state.listPhase = null;
      pulseReveal();
      enterView();
      scrollTop();
    }, 560);
  }

  function goHome() {
    if (state.view === 'list') {
      state.listPhase = 'in';
      pulseReveal(); settleList();
      enterView();
      scrollTop();
      return;
    }
    if (state.postPhase === 'out') return;
    state.postPhase = 'out';
    applyArticleOut();
    scrollTop();
    clearTimeout(timers.phase);
    timers.phase = setTimeout(function () {
      state.view = 'list'; state.postPhase = null; state.listPhase = 'in';
      pulseReveal(); settleList();
      enterView();
    }, 540);
  }

  function openAbout() {
    if (state.view === 'about') return;
    var cur = state.view;
    state.sortOpen = false;
    if (cur === 'list') { state.listPhase = 'out'; applyListOut(); }
    else { state.postPhase = 'out'; applyArticleOut(); }
    clearTimeout(timers.phase);
    timers.phase = setTimeout(function () {
      state.view = 'about'; state.listPhase = null; state.postPhase = null;
      pulseReveal();
      enterView();
      scrollTop();
    }, cur === 'list' ? 560 : 540);
  }

  /* ===================== LIST view ===================== */

  function renderListHero() {
    els.heroBack.innerHTML = '';
    els.heroContent.innerHTML =
      '<div style=\'' + heroInAnim_wrap() + '\'>' +
        '<div style="font-size:15px;font-weight:600;color:rgba(255,255,255,.95);margin-bottom:14px;letter-spacing:.04em;text-shadow:0 1px 14px rgba(40,80,140,.3);">Blog</div>' +
        '<h1 style="font-size:clamp(40px,6.2vw,74px);line-height:1.04;font-weight:600;letter-spacing:-.025em;color:#ffffff;margin:0 auto;max-width:13ch;text-shadow:0 3px 30px rgba(40,80,140,.32);">Notes from the frontier of AI</h1>' +
        '<p style="margin:22px auto 0;max-width:48ch;color:rgba(255,255,255,.95);font-size:18px;line-height:1.5;text-shadow:0 2px 18px rgba(40,80,140,.34);">Field notes, experiments, and half-formed ideas from the Theoistic lab.</p>' +
      '</div>';
  }

  function renderListMain() {
    var searchHtml = SHOW_SEARCH ?
      '<div style="display:flex;align-items:center;gap:9px;background:#f1f5f9;border:1px solid #eef2f7;border-radius:13px;padding:10px 15px;min-width:248px;">' +
        '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>' +
        '<input id="thx-search" type="text" placeholder="Search" value="' + esc(state.query) + '" style="border:none;background:transparent;outline:none;font-family:inherit;font-size:15px;color:#334155;flex:1;min-width:0;" />' +
      '</div>' : '';

    els.mainContent.innerHTML =
      '<div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:30px;">' +
          '<h2 style="font-size:24px;font-weight:600;margin:0;letter-spacing:-.01em;">Articles</h2>' +
          searchHtml +
        '</div>' +
        '<div id="thx-dynamic"></div>' +
        '<footer style="margin-top:60px;padding-top:26px;border-top:1px solid #eef2f7;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">' +
          '<span style="font-size:13.5px;color:#94a3b8;">Theoistic — research, in the open.</span>' +
          '<span style="font-size:13.5px;color:#cbd5e1;">© 2025</span>' +
        '</footer>' +
      '</div>';

    var search = document.getElementById('thx-search');
    if (search) {
      search.addEventListener('input', function () { state.query = search.value; renderResults(); });
    }
    renderResults();
  }

  // Rebuild only the featured + filters + grid (keeps the search box focused).
  function renderResults() {
    var all = state.posts;
    var featuredRaw = all.filter(function (p) { return p.featured; })[0] || null;
    var phase = state.listPhase;

    // category tabs
    var cats = ['All'];
    all.forEach(function (p) { if (p.category && cats.indexOf(p.category) < 0) cats.push(p.category); });

    // filter predicate shared by the featured card AND the grid, so a search or
    // category that the featured post doesn't match also hides the featured card.
    var q = (state.query || '').trim().toLowerCase();
    var sort = state.sort || DEFAULT_SORT;
    function matches(p) {
      if (!p) return false;
      if (state.activeCat !== 'All' && p.category !== state.activeCat) return false;
      if (q && ((p.title || '') + ' ' + (p.excerpt || '') + ' ' + (p.category || '')).toLowerCase().indexOf(q) < 0) return false;
      return true;
    }
    var featuredVisible = !!featuredRaw && matches(featuredRaw);

    // grid = every post except the featured one, filtered + sorted
    var grid = all.filter(function (p) { return p !== featuredRaw; }).filter(matches);
    if (sort === 'Oldest') grid = grid.slice().sort(function (a, b) { return (a.date || '').localeCompare(b.date || ''); });
    else if (sort === 'A–Z') grid = grid.slice().sort(function (a, b) { return (a.title || '').localeCompare(b.title || ''); });
    else grid = grid.slice().sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });

    var html = '';

    if (state.loading) {
      html = '<div style="padding:60px 0;text-align:center;color:#94a3b8;font-size:15px;">Loading articles…</div>';
    } else if (state.error) {
      html = '<div style="padding:40px 24px;text-align:center;color:#64748b;font-size:15px;line-height:1.6;background:#f8fafc;border-radius:16px;border:1px solid #eef2f7;">' + esc(state.error) + '</div>';
    } else {
      // featured (only when it matches the active search/category)
      if (featuredVisible) html += featuredCard(featuredRaw, phase);

      // category filters + sort
      html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin:6px 0 26px;border-top:1px solid #eef2f7;padding-top:24px;">';
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      cats.forEach(function (label) {
        var active = label === state.activeCat;
        var st = css({ border: 'none', borderRadius: '999px', padding: '9px 16px', fontSize: '14.5px', fontWeight: 500, cursor: 'pointer', fontFamily: 'inherit', background: active ? '#0f172a' : 'transparent', color: active ? '#ffffff' : '#64748b', transition: 'all .15s' });
        html += '<button data-cat="' + esc(label) + '" style=\'' + st + '\'>' + esc(label) + '</button>';
      });
      html += '</div>';
      html += sortControl(sort);
      html += '</div>';

      // grid
      if (grid.length) {
        html += '<div class="thx-grid" style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(22px,3vw,40px) clamp(24px,4vw,52px);perspective:1100px;">';
        grid.forEach(function (p, i) { html += gridCard(p, i, phase); });
        html += '</div>';
      } else if (!featuredVisible) {
        // Grid empty AND no featured card showing — say why.
        if (q || state.activeCat !== 'All') {
          html += '<div style="padding:60px 0;text-align:center;color:#94a3b8;font-size:15px;">No articles match your search.</div>';
        } else {
          html += '<div style="padding:60px 0;text-align:center;color:#94a3b8;font-size:15px;">No posts yet.</div>';
        }
      }
      // else: grid empty but the featured card stands on its own — no empty-state noise.
    }

    var dyn = document.getElementById('thx-dynamic');
    if (!dyn) return;
    dyn.innerHTML = html;
    wireResults(dyn);
  }

  function sortControl(sort) {
    var s = '<div style="position:relative;">' +
      '<button data-sort-toggle="1" style="display:flex;align-items:center;gap:9px;border:1px solid #e6ebf2;background:#ffffff;border-radius:999px;padding:9px 15px;font-family:inherit;font-size:14.5px;font-weight:500;color:#334155;cursor:pointer;">' +
        '<span>' + esc(sort) + '</span>' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</button>';
    if (state.sortOpen) {
      s += '<div style="position:absolute;top:46px;right:0;min-width:152px;background:#ffffff;border:1px solid #eef2f7;border-radius:14px;box-shadow:0 20px 44px -18px rgba(40,80,140,.3);padding:6px;display:flex;flex-direction:column;gap:2px;z-index:30;animation:thxPop .18s ease;">';
      ['Newest', 'Oldest', 'A–Z'].forEach(function (label) {
        var st = css({ textAlign: 'left', border: 'none', background: label === sort ? '#f1f5f9' : 'transparent', color: '#334155', padding: '9px 12px', borderRadius: '9px', fontSize: '14px', cursor: 'pointer', fontFamily: 'inherit', fontWeight: label === sort ? 600 : 500, width: '100%' });
        s += '<button data-sort-opt="' + esc(label) + '" style=\'' + st + '\'>' + esc(label) + '</button>';
      });
      s += '</div>';
    }
    s += '</div>';
    return s;
  }

  function featuredCard(p, phase) {
    var wrap = css({ perspective: '1000px', cursor: 'pointer', transition: 'transform .55s cubic-bezier(.2,.7,.2,1)', willChange: 'transform', marginBottom: '40px', display: 'block' });
    var gridStyle = css({ display: 'grid', gridTemplateColumns: 'minmax(0,1.05fr) minmax(0,1fr)', gap: 'clamp(24px,4vw,52px)', alignItems: 'center' });
    var anim = cardAnim(0, phase);
    var thumb = css({ background: bgFor(p), borderRadius: '22px', position: 'relative', minHeight: '320px', overflow: 'hidden' });
    var accent = css({ color: ACCENT, fontSize: '13px', fontWeight: 600, letterSpacing: '.05em', textTransform: 'uppercase', marginBottom: '14px' });
    return '' +
      '<section data-tilt="true" data-open="' + esc(p.slug) + '" style=\'' + wrap + '\'>' +
        '<div class="thx-featured" data-anim style=\'' + gridStyle + (anim ? 'animation:' + anim + ';' : '') + '\'>' +
          '<div class="thx-featured-thumb" style=\'' + thumb + '\'><span style=\'' + READ_CHIP + '\'>' + esc(p.readingTime) + '</span></div>' +
          '<div>' +
            '<div style=\'' + accent + '\'>Featured</div>' +
            '<h3 style="font-size:clamp(24px,3vw,31px);line-height:1.16;font-weight:600;letter-spacing:-.02em;margin:0 0 14px;color:#0f172a;">' + esc(p.title) + '</h3>' +
            '<p style="font-size:16px;line-height:1.55;color:#64748b;margin:0 0 18px;">' + esc(p.excerpt) + '</p>' +
            '<div style="display:flex;align-items:center;gap:9px;margin:0 0 18px;">' +
              '<span style=\'' + avatarDot(p) + '\'></span>' +
              '<span style="font-size:14px;font-weight:600;color:#334155;">' + esc(p.author) + '</span>' +
              '<span style="font-size:13px;color:#94a3b8;">' + esc(p.authorRole) + '</span>' +
            '</div>' +
            '<div style="display:flex;gap:9px;flex-wrap:wrap;">' +
              '<span style=\'' + tagStyle() + '\'>' + esc(p.category) + '</span>' +
              '<span style=\'' + DATE_PILL + '\'>' + esc(p.dateLabel) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</section>';
  }

  function gridCard(p, i, phase) {
    var wrap = css({ perspective: '900px', cursor: 'pointer', transition: 'transform .55s cubic-bezier(.2,.7,.2,1)', willChange: 'transform' });
    var anim = cardAnim(i, phase);
    var thumb = css({ background: bgFor(p), borderRadius: '16px', position: 'relative', minHeight: '128px', width: '150px', flexShrink: 0, overflow: 'hidden' });
    return '' +
      '<article data-tilt="true" data-open="' + esc(p.slug) + '" style=\'' + wrap + '\'>' +
        '<div data-anim style=\'display:flex;gap:18px;align-items:stretch;' + (anim ? 'animation:' + anim + ';' : '') + '\'>' +
          '<div style=\'' + thumb + '\'><span style=\'' + READ_CHIP + '\'>' + esc(p.readingTime) + '</span></div>' +
          '<div style="display:flex;flex-direction:column;gap:7px;padding-top:2px;flex:1;min-width:0;">' +
            '<h4 style="font-size:17.5px;font-weight:600;line-height:1.26;margin:0;color:#0f172a;letter-spacing:-.01em;">' + esc(p.title) + '</h4>' +
            '<p style="font-size:13.5px;line-height:1.5;color:#64748b;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + esc(p.excerpt) + '</p>' +
            '<div style="margin-top:auto;display:flex;flex-direction:column;gap:9px;padding-top:10px;">' +
              '<div style="display:flex;align-items:center;gap:7px;">' +
                '<span style=\'' + avatarDot(p) + '\'></span>' +
                '<span style="font-size:12.5px;font-weight:600;color:#475569;">' + esc(p.author) + '</span>' +
              '</div>' +
              '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
                '<span style=\'' + tagStyle() + '\'>' + esc(p.category) + '</span>' +
                '<span style=\'' + DATE_PILL + '\'>' + esc(p.dateLabel) + '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</article>';
  }

  function wireResults(root) {
    root.querySelectorAll('[data-open]').forEach(function (el) {
      el.addEventListener('click', function () { openPost(el.getAttribute('data-open')); });
    });
    root.querySelectorAll('[data-cat]').forEach(function (el) {
      el.addEventListener('click', function () { state.activeCat = el.getAttribute('data-cat'); state.sortOpen = false; renderResults(); });
    });
    var toggle = root.querySelector('[data-sort-toggle]');
    if (toggle) toggle.addEventListener('click', function (e) { e.stopPropagation(); state.sortOpen = !state.sortOpen; renderResults(); });
    root.querySelectorAll('[data-sort-opt]').forEach(function (el) {
      el.addEventListener('click', function () { state.sort = el.getAttribute('data-sort-opt'); state.sortOpen = false; renderResults(); });
    });
  }

  /* ===================== POST view ===================== */

  function renderPostHero() {
    var p = currentPost();
    els.heroBack.innerHTML =
      '<div style=\'position:absolute;top:clamp(84px,9vw,104px);left:clamp(20px,5vw,56px);z-index:4;' + heroInAnim_inline() + '\'>' +
        '<button data-nav="home" style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.3);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.6);color:#1f3a5f;padding:8px 14px;border-radius:12px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;box-shadow:0 6px 20px -8px rgba(40,80,140,.3);">' +
          '<span style="font-size:16px;line-height:1;">←</span><span>All articles</span>' +
        '</button>' +
      '</div>';
    els.heroContent.innerHTML = p ?
      ('<div style=\'' + heroInAnim_wrap() + '\'>' +
        '<div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.95);margin-bottom:16px;text-shadow:0 1px 14px rgba(40,80,140,.3);">' + esc(p.category) + '</div>' +
        '<h1 style="font-size:clamp(30px,4.6vw,52px);line-height:1.1;font-weight:600;letter-spacing:-.025em;color:#ffffff;margin:0 auto;max-width:19ch;text-shadow:0 3px 28px rgba(40,80,140,.32);">' + esc(p.title) + '</h1>' +
        '<div style="margin-top:20px;font-size:14.5px;color:rgba(255,255,255,.95);display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;text-shadow:0 1px 12px rgba(40,80,140,.3);">' +
          '<span style="font-weight:600;">' + esc(p.author) + '</span>' +
          '<span style="opacity:.6;">·</span>' +
          '<span>' + esc(p.dateLabel) + '</span>' +
          '<span style="opacity:.6;">·</span>' +
          '<span>' + esc(p.readingTime) + '</span>' +
        '</div>' +
      '</div>') : '';
    wireNav(els.heroBack);
  }

  function renderPostMain() {
    var p = currentPost();
    var cover = css({ background: p ? bgFor(p) : '#eef2f7', borderRadius: '20px', position: 'relative', minHeight: '264px', marginBottom: '40px', overflow: 'hidden' });
    els.mainContent.innerHTML =
      '<div style=\'margin:0;' + (contentInAnim() ? 'animation:' + contentInAnim() + ';' : '') + '\'>' +
        '<div style=\'' + cover + '\'><span style=\'' + READ_CHIP + '\'>' + esc(p ? p.readingTime : '') + '</span></div>' +
        '<div id="thx-prose" class="thx-prose" style="--accent:' + ACCENT + '"></div>' +
        '<div style="margin-top:54px;padding-top:28px;border-top:1px solid #eef2f7;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">' +
          '<div style="font-size:14px;color:#94a3b8;">Written by <span style="color:#334155;font-weight:600;">' + esc(p ? p.author : '') + '</span></div>' +
          '<button data-nav="home" style="background:none;border:none;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;color:' + ACCENT + ';">← Back to all articles</button>' +
        '</div>' +
      '</div>';
    wireNav(els.mainContent);
    renderPostProse();
  }

  function renderPostProse() {
    var prose = document.getElementById('thx-prose');
    if (!prose) return;
    var slug = state.slug;
    var body = slug ? state.bodies[slug] : null;
    if (body == null) {
      prose.innerHTML = '<div style="padding:48px 0;color:#94a3b8;font-size:15px;">Loading…</div>';
    } else if (!body) {
      // Slug exists in index.json but its .md is missing/empty — don't render blank.
      prose.innerHTML = '<div style="padding:48px 0;color:#94a3b8;font-size:15px;">This article could not be loaded.</div>';
    } else {
      prose.innerHTML = markdown(body);
    }
  }

  /* ===================== ABOUT view ===================== */

  function renderAboutHero() {
    var a = state.about || {};
    els.heroBack.innerHTML = '';
    els.heroContent.innerHTML =
      '<div style=\'' + heroInAnim_wrap() + '\'>' +
        '<div style="font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.95);margin-bottom:16px;text-shadow:0 1px 14px rgba(40,80,140,.3);">About</div>' +
        '<h1 style="font-size:clamp(34px,5vw,58px);line-height:1.08;font-weight:600;letter-spacing:-.025em;color:#ffffff;margin:0 auto;max-width:17ch;text-shadow:0 3px 28px rgba(40,80,140,.32);">' + esc(a.title || 'About Theoistic') + '</h1>' +
        '<p style="margin:20px auto 0;max-width:46ch;color:rgba(255,255,255,.95);font-size:18px;line-height:1.5;text-shadow:0 2px 18px rgba(40,80,140,.34);">' + esc(a.subtitle || '') + '</p>' +
      '</div>';
  }

  function renderAboutMain() {
    var a = state.about || {};
    var eyebrow = css({ color: ACCENT, fontSize: '13px', fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase', marginBottom: '14px' });
    var roleStyle = css({ color: ACCENT, fontSize: '17px', fontWeight: 600, margin: '0 0 16px' });
    var accentBtn = css({ background: ACCENT, color: '#ffffff', border: 'none', borderRadius: '12px', padding: '12px 20px', fontFamily: 'inherit', fontSize: '15px', fontWeight: 600, cursor: 'pointer', boxShadow: '0 12px 28px -10px ' + hexA(ACCENT, 0.55) });
    var photoStyle = css(Object.assign({ borderRadius: '22px', minHeight: '340px', position: 'relative', overflow: 'hidden', boxShadow: '0 24px 54px -28px rgba(40,80,140,.45)' },
      a.photo ? { background: 'url("' + cssUrl(a.photo) + '") center/cover no-repeat' } : { background: 'repeating-linear-gradient(135deg,#dce9fb 0 14px,#e9f2fd 14px 28px)' }));
    var chipBase = { position: 'absolute', background: 'rgba(255,255,255,.92)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)', border: '1px solid rgba(230,238,252,.9)', borderRadius: '999px', padding: '7px 13px', fontSize: '12.5px', fontWeight: 600, color: ACCENT, boxShadow: '0 12px 26px -12px rgba(40,80,140,.4)', whiteSpace: 'nowrap' };
    var chipA = css(Object.assign({}, chipBase, { top: '-12px', right: '18px' }));
    var chipB = css(Object.assign({}, chipBase, { bottom: '-12px', left: '18px' }));

    els.mainContent.innerHTML =
      '<div style=\'margin:0;' + (contentInAnim() ? 'animation:' + contentInAnim() + ';' : '') + '\'>' +
        '<div class="thx-about-intro" style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,330px);gap:clamp(24px,4vw,48px);align-items:center;background:linear-gradient(135deg,#eef5ff,#f7fbff);border:1px solid #e8effb;border-radius:26px;padding:clamp(26px,3.5vw,44px);margin-bottom:52px;box-shadow:0 22px 54px -32px rgba(40,80,140,.3);">' +
          '<div>' +
            '<div style=\'' + eyebrow + '\'>Welcome</div>' +
            '<h2 style="font-family:\'Schibsted Grotesk\',sans-serif;font-size:clamp(26px,3.4vw,38px);font-weight:600;line-height:1.12;letter-spacing:-.02em;color:#0f172a;margin:0 0 6px;">Hi, I\'m ' + esc(a.name || 'Theo Almeida') + '</h2>' +
            '<div style=\'' + roleStyle + '\'>' + esc(a.role || 'Founder & Researcher') + '</div>' +
            '<p style="font-size:16.5px;line-height:1.62;color:#475569;margin:0 0 26px;">' + esc(a.intro || '') + '</p>' +
            '<div style="display:flex;gap:12px;flex-wrap:wrap;">' +
              '<button data-nav="home" style=\'' + accentBtn + '\'>Read the blog</button>' +
              '<a href="https://github.com/theoistic" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;background:#ffffff;border:1px solid #e8effb;border-radius:12px;padding:12px 18px;font-family:inherit;font-size:15px;font-weight:600;color:#0f172a;cursor:pointer;text-decoration:none;box-shadow:0 10px 24px -12px rgba(40,80,140,.3);">' +
                '<svg width="16" height="16" viewBox="0 0 16 16" fill="#0f172a"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>' +
                '<span>GitHub</span>' +
              '</a>' +
            '</div>' +
          '</div>' +
          '<div style=\'' + photoStyle + '\'>' +
            (!a.photo ? '<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:ui-monospace,Menlo,monospace;font-size:13px;color:#7d97c4;letter-spacing:.02em;">your photo →</span>' : '') +
            '<span style=\'' + chipA + '\'>LLMs</span>' +
            '<span style=\'' + chipB + '\'>AI Tooling</span>' +
          '</div>' +
        '</div>' +
        '<div class="thx-prose thx-about" style="--accent:' + ACCENT + '">' + markdown(a.body || '') + '</div>' +
        '<div style="margin-top:54px;padding-top:28px;border-top:1px solid #eef2f7;">' +
          '<button data-nav="home" style="background:none;border:none;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;color:' + ACCENT + ';">← Back to the blog</button>' +
        '</div>' +
      '</div>';
    wireNav(els.mainContent);
  }

  /* ===================== helpers tied to state ===================== */

  function currentPost() {
    return state.posts.filter(function (p) { return p.slug === state.slug; })[0] || null;
  }
  // hero text wrapper inline style (animation only)
  function heroInAnim_wrap() { var a = heroInAnim(); return a ? 'animation:' + a + ';' : ''; }
  function heroInAnim_inline() { var a = heroInAnim(); return a ? 'animation:' + a + ';' : ''; }

  function wireNav(root) {
    root.querySelectorAll('[data-nav]').forEach(function (el) {
      if (el.__wired) return;
      el.__wired = true;
      el.addEventListener('click', function (e) {
        e.preventDefault();
        var t = el.getAttribute('data-nav');
        if (t === 'home') goHome();
        else if (t === 'about') openAbout();
      });
    });
  }

  /* ===================== 3D tilt on cards ===================== */

  var tiltEl = null;
  function resetTilt(el) {
    el.style.setProperty('transform', 'perspective(900px) rotateX(0deg) rotateY(0deg)', 'important');
    el.style.transition = 'transform .55s cubic-bezier(.2,.7,.2,1)';
  }
  function onPointerMove(e) {
    var card = e.target && e.target.closest ? e.target.closest('[data-tilt]') : null;
    if (tiltEl && tiltEl !== card) { resetTilt(tiltEl); tiltEl = null; }
    if (!card) return;
    tiltEl = card;
    var r = card.getBoundingClientRect();
    var px = (e.clientX - r.left) / r.width - 0.5;
    var py = (e.clientY - r.top) / r.height - 0.5;
    var rx = (-py * 8).toFixed(2);
    var ry = (px * 11).toFixed(2);
    card.style.setProperty('transform', 'perspective(900px) rotateX(' + rx + 'deg) rotateY(' + ry + 'deg) translateZ(8px)', 'important');
    card.style.transition = 'transform .1s ease-out';
  }

  /* ===================== boot ===================== */

  function init() {
    els.heroBack = document.getElementById('hero-back');
    els.heroContent = document.getElementById('hero-content');
    els.mainContent = document.getElementById('main-content');

    document.querySelector('#app').setAttribute('data-accent', ACCENT);
    wireNav(document); // nav bar links

    document.addEventListener('pointermove', onPointerMove, { passive: true });
    // Close the sort menu when clicking elsewhere.
    document.addEventListener('click', function (e) {
      if (state.sortOpen && state.view === 'list' && !(e.target.closest && e.target.closest('[data-sort-toggle],[data-sort-opt]'))) {
        state.sortOpen = false; renderResults();
      }
    });

    // reveal gates the hero/content entry animations; it always clears 1700ms
    // after mount, whether or not posts load (matches the original behaviour).
    timers.reveal = setTimeout(function () { state.reveal = false; }, 1700);

    // initial render (loading state), then fetch.
    enterView();
    loadPosts();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
